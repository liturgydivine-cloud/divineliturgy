<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic Metadata for Search Engines -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liturgical Studies: 19 Lectures</title>
    
    <!-- External Resources -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Specific styles for the Index Page Grid */
        body { text-align: center; padding: 50px 20px; }
        
        .search-input {
            padding: 12px; width: 100%; max-width: 400px;
            border-radius: 8px; border: 1px solid var(--accent);
            margin-bottom: 40px; font-family: inherit;
        }

        .lecture-grid {
            max-width: 1100px; margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white; border: 1px solid #e2dcc8; padding: 30px; 
            border-radius: 12px; text-decoration: none; color: var(--primary); 
            font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            display: flex; flex-direction: column; height: 120px; justify-content: center;
        }

        .card:hover { transform: translateY(-5px); background: var(--primary); color: white; border-color: var(--primary); }
        
        .card span { display: block; color: var(--accent); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 8px; }
        .card:hover span { color: #fdfcf8; }
    </style>
</head>
<body>

    <!-- Header Section -->
    <h1 style="font-size: 3rem; margin-bottom: 5px;">Liturgical Studies</h1>
    <p style="color: #555;">A 19-Part Journey through the Divine Liturgy</p>

    <!-- Real-time Search Bar -->
    <input type="text" id="searchInput" class="search-input" placeholder="Search lectures (e.g. Incense, Lamb)..." onkeyup="filterLectures()">

    <!-- Lecture Grid -->
    <div class="lecture-grid" id="lectureGrid">
        <!-- Card Template: Link, Lecture Label, and Title -->
        <a href="lecture-01.html" class="card"><span>Lecture 1</span>Raising of Incense</a>
        <a href="lecture-02.html" class="card"><span>Lecture 2</span>The Prayers of the Rite</a>
        <a href="lecture-03.html" class="card"><span>Lecture 3</span>Choosing the Lamb</a>
        <!-- ... add all 19 cards here ... -->
        <a href="lecture-19.html" class="card"><span>Lecture 19</span>Communion & Dismissal</a>
    </div>

    <script>
        /**
         * Real-time Filter Logic
         * Loops through all 'card' elements and hides those that don't match the search term
         */
        function filterLectures() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let i = 0; i < cards.length; i++) {
                if (cards[i].innerText.toLowerCase().includes(input)) {
                    cards[i].style.display = "flex";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
